<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DormGate — Sign In</title>
<meta name="description" content="DormGate — sign in to the Dormitory Movement System. Your ID decides your dashboard.">
<link rel="stylesheet" href="assets/css/tokens.css">
</head>
<body>

<div class="auth">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#fff" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#fff" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#fff" stroke-width="2"/><path d="M14 14h3v3h-3zM18 18h3v3h-3z" fill="#fff"/></svg>
      </div>
      <div class="auth-title">DormGate</div>
      <div class="auth-sub">Dormitory Movement System</div>
      <span class="auth-role">SIGN IN</span>
    </div>

    <div class="fieldgroup">
      <div class="field-label">USERNAME / ID</div>
      <div class="field focus">
        <input class="auth-input" id="userId" type="text" autocomplete="off" spellcheck="false" placeholder="Student ID or Staff ID">
      </div>
    </div>

    <div class="fieldgroup">
      <div class="field-label">PASSWORD</div>
      <div class="field" style="justify-content:space-between">
        <input class="auth-input" id="password" type="password" autocomplete="off" placeholder="Password">
        <svg id="togglePw" style="cursor:pointer;flex-shrink:0" width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="#8A9AB8" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke="#8A9AB8" stroke-width="1.8"/></svg>
      </div>
    </div>

    <div class="auth-err" id="authErr"></div>

    <button class="btn btn-primary" id="signIn">Sign In</button>

    <div class="auth-divider"><span class="l"></span><span class="t">DEMO QUICK FILL</span><span class="l"></span></div>
    <div class="auth-quick">
      <button type="button" data-role="student">Student</button>
      <button type="button" data-role="guard">Guard</button>
      <button type="button" data-role="warden">Warden</button>
    </div>

    <div class="auth-back">New student? <a href="student.html#register">Create account</a></div>

  </div>
</div>

<script src="assets/js/auth.js"></script>
</body>
</html>
